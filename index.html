<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Pro | Sound & Survival</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="nav-top-row">
            <div class="nav-left">MEMORY<span>PRO</span></div>
            <div class="nav-center">LVL <span id="current-level">1</span></div>
            <div class="nav-right"><button id="theme-toggle" class="theme-btn">🌓</button></div>
        </div>
        
        <div class="stats-bar">
            <div class="stat warning-box">
                <span>Time</span>
                <b id="timer">01:00</b>
            </div>
            <div class="stat">
                <span>Moves</span>
                <b id="moves">0</b>
            </div>
            <div class="stat">
                <span>Pairs</span>
                <b id="pairs-left">0</b>
            </div>
        </div>
    </nav>

    <main class="game-area">
        <div id="grid" class="grid"></div>
    </main>

    <div id="game-modal" class="modal">
        <div class="modal-content">
            <div id="modal-icon" class="badge"></div>
            <h2 id="modal-title"></h2>
            <p id="modal-desc"></p>
            <button id="modal-btn">Continue</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
